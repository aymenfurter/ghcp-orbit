<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="scarf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Scarf knot -->
  <ellipse cx="256" cy="195" rx="38" ry="28" fill="url(#scarf)" opacity="0.9"/>
  <!-- Scarf tail left — flowing down and curving out -->
  <path d="M232 210 Q210 280 185 340 Q170 380 190 410" fill="none" stroke="url(#scarf)" stroke-width="32" stroke-linecap="round" opacity="0.85"/>
  <!-- Scarf tail right — flowing down longer with a wave -->
  <path d="M280 210 Q300 290 310 350 Q320 390 295 430" fill="none" stroke="url(#scarf)" stroke-width="28" stroke-linecap="round" opacity="0.7"/>
  <!-- Scarf wrap band across top -->
  <path d="M200 175 Q228 155 256 160 Q284 155 312 175" fill="none" stroke="url(#scarf)" stroke-width="18" stroke-linecap="round"/>
</svg>
