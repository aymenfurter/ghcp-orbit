<!DOCTYPE html>
<html lang="en">

  <title>Orbit</title>
</head>

    </div>

      <a class="nav-item" data-page="patterns">

      <div class="nav-section-label">Activity</div>
      <a class="nav-item" data-page="timeline">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>

      </a>
      <a class="nav-item" data-page="journey">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="19" r="3"/><circle cx="18" cy="5" r="3"/><path d="M12 19h4.5a3.5 3.5 0 0 0 0-7h-9a3.5 3.5 0 0 1 0-7H12"/></svg>

      </a>
      <a class="nav-item" data-page="sessions">

        Sessions
      </a>

      <div class="nav-section-label">Intelligence</div>
      <a class="nav-item" data-page="tooling">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>

        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 1 1 7.072 0l-.548.547A3.374 3.374 0 0 0 14 18.469V19a2 2 0 1 1-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>

        Presentation
      </a>
    </nav>

    <div class="sidebar-ws" id="sidebar-ws">
      <div class="sidebar-ws-header">
        <span class="nav-section-label" style="padding:0">Workspace Filter</span>
      </div>
      <input type="text" id="ws-search" class="ws-search" placeholder="Search workspaces…" autocomplete="off" spellcheck="false" />
      <div class="sidebar-ws-list" id="ws-list">
        <div class="ws-item active" data-ws="">
          <span class="ws-name">All Workspaces</span>
        </div>
      </div>
    </div>

    <div class="sidebar-footer">
      <button class="sidebar-btn" id="btn-reload">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Reload
      </button>
      <button class="sidebar-btn" id="btn-logs-dir">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Logs Folder
      </button>
    </div>
  </aside>

  <main id="content"></main>

  <div class="load-overlay" id="load-overlay">
    <img src="icon.png" alt="Orbit" class="load-overlay-logo" width="72" height="72" />
    <div class="load-overlay-text">Analyzing sessions</div>
    <div class="load-bar-track">
      <div class="load-bar-fill"></div>
    </div>
    <div class="load-overlay-sub" id="load-sub">Scanning log files...</div>
  </div>

  <script src="index.js"></script>
</body>
</html>
